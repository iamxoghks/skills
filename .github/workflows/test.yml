name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg poppler-utils

      - name: Install Playwright and Python verification tools
        run: |
          npm install --global @playwright/cli playwright
          npx playwright install --with-deps chromium
          python -m pip install --upgrade pip pillow pypdf

      - name: Verify skill discovery
        run: npx --yes skills add . --list

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run end-to-end smoke test
        run: python tests/smoke_test.py

name: Publish codex-receipts to npm

on:
  push:
    tags:
      - "codex-receipts-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/codex-receipts

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/codex-receipts/package-lock.json

      - name: Verify tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "codex-receipts-v$version"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --access public
